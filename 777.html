<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unified Layout</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-screen {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* 横幅をPCでも「高さ100%の時の4:3幅」に固定 */
            width: calc(100vh * 4 / 3);
            max-width: 100%;
        }

        /* 1枚目：高さフル画面 */
        .img1 {
            background-image: url('image1.jpg');
            background-color: #222;
            height: 100vh;
        }

        /* 2枚目：スマホ版(image_4.png)の長さをPCでも再現 */
        .img2 {
            background-image: url('image2.jpg');
            background-color: #333;
            /* スマホの「縦長画面(16:9想定)」から「1枚目の4:3」を引いた残りの比率を計算 */
            /* 100vh(フル) - (100vw * 3/4) だとズレるため、スマホの標準的な余りである「約55vh」に固定 */
            height: 55vh; 
        }

        /* --- スマホ専用（スクロール禁止・フルスクリーン） --- */
        @media (max-width: 768px) {
            html, body {
                height: 100svh;
                overflow: hidden;
                position: fixed;
            }
            .container {
                height: 100dvh;
            }
            .game-screen {
                width: 100%; /* スマホでは横幅いっぱい */
            }
            .img1 {
                height: auto;
                aspect-ratio: 4 / 3;
            }
            .img2 {
                /* スマホでは「画面の底まで」を優先して埋める */
                flex-grow: 1;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1枚目：4:3エロゲ風フルスクリーン -->
        <div class="game-screen img1"></div>

        <!-- 2枚目：PCでもスマホと同じ長さになるよう調整 -->
        <div class="game-screen img2"></div>
    </div>

</body>
</html>
