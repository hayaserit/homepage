<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unified Layout - Fixed Ratio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background-color: #000; /* 全体の背景を黒に */
        }

        .game-screen {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* PC: 高さ100%の時の4:3幅に固定 */
            width: calc(100vh * 4 / 3);
            max-width: 100%;
        }

        /* 1枚目：高さフル画面 */
        .img1 {
            background-image: url('image1.jpg');
            background-color: #222;
            height: 100vh;
        }

        /* 2枚目：PCでの表示長さを設定 */
        .img2 {
            background-image: url('image2.jpg');
            background-color: #333;
            height: 55vh; 
        }

        /* --- スマホ専用設定 --- */
        @media (max-width: 768px) {
            html, body {
                height: 100svh;
                overflow: hidden;
                position: fixed;
            }
            .container {
                height: 100dvh;
            }
            .game-screen {
                width: 100%; /* スマホでは横幅いっぱい */
            }
            .img1 {
                height: auto;
                aspect-ratio: 4 / 3;
            }
            .img2 {
                /* ここがポイント：引き伸ばしを防止し、高さをPCと同じ55vhに固定 */
                flex-grow: 0; 
                height: 55vh; 
                /* 画像の比率を維持して表示（余白ができる） */
                background-size: contain;
                background-position: top center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="game-screen img1"></div>

        <div class="game-screen img2"></div>
    </div>

</body>
</html>
