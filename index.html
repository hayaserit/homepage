<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Layout</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 共通設定 */
        .game-screen {
            display: block;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* PC表示の比率維持 */
            width: calc(100vh * 4 / 3);
            max-width: 100%;
            aspect-ratio: 4 / 3;
            height: auto;
        }

        /* 1枚目：ダウンロード.png */
        .img1 { 
            background-image: url('ダウンロード.png'); 
        }

        /* 2枚目：これまでの画像 */
        .img2 { 
            background-image: url('27447498.jpg'); 
        }

        /* スマホ専用設定 */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden; 
                position: fixed;
                background-color: #000;
            }

            .container {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
            }

            .game-screen {
                width: 100% !important;
                aspect-ratio: 4 / 3 !important; 
                height: auto !important;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1枚目：リンクが必要な場合は href="..." にURLを入れてください -->
        <a href="#" class="game-screen img1"></a>
        
        <!-- 2枚目 -->
        <a href="#" class="game-screen img2"></a>
    </div>

</body>
</html>
