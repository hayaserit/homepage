<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早世 hayaserit homepage</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 共通の画像設定 */
        .game-screen {
            display: block;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* PC表示の比率維持 */
            width: calc(100vh * 4 / 3); 
            max-width: 100%;
            aspect-ratio: 4 / 3; 
            height: auto;
        }

        /* --- 画像の個別指定 --- */
        .img1 { 
            background-image: url('ダウンロード.png');
        }

        .img2 { 
            background-image: url('27447498.jpg');
        }

        /* フッターエリア */
        .footer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            width: 100%;
            background-color: #000;
        }

        /* 手書き風フォントだけの時計スタイル */
        #digital-clock {
            font-family: 'Kiwi Maru', sans-serif; /* 手書きフォントを適用 */
            font-size: 38px; /* 存在感のある大きめのサイズ */
            color: #ffffff; /* 完全に不自然じゃない、パキッとした白文字 */
            letter-spacing: 1px; /* 自然な文字の間隔 */
            margin-bottom: 12px;
            line-height: 1;
        }

        .copyright {
            color: #555;
            font-size: 12px;
            font-family: 'Kiwi Maru', sans-serif; /* コピーライトも手書きでお洒落に */
            opacity: 0.7;
        }

        /* スマホ専用設定 */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden; 
                position: fixed;  
                background-color: #000;
            }

            .container {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start; 
            }

            .game-screen {
                width: 100% !important;
                aspect-ratio: 4 / 3 !important; 
                height: auto !important;
                flex-shrink: 0; 
            }

            .footer-area {
                position: absolute;
                bottom: 20px;
                padding: 0;
            }
            
            #digital-clock {
                font-size: 30px; /* スマホでは画面に合わせて少しスリムに */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="#" class="game-screen img1"></a>
        <a href="#" class="game-screen img2"></a>

        <div class="footer-area">
            <div id="digital-clock">00:00</div>
            
            <div class="copyright">-2026 hayaserit-</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('digital-clock').textContent = `${hours}:${minutes}`;
        }
        updateClock();
        const secondsToNextMinute = 60 - new Date().getSeconds();
        setTimeout(function() {
            updateClock();
            setInterval(updateClock, 60000);
        }, secondsToNextMinute * 1000);
    </script>

</body>
</html>
