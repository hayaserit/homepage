<style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 共通の画像設定 */
        .game-screen {
            display: block;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* PC表示の比率維持 */
            width: calc(100vh * 4 / 3); 
            max-width: 100%;
            aspect-ratio: 4 / 3; 
            height: auto;
        }

        /* --- 画像の個別指定 --- */
        .img1 { 
            background-image: url('ダウンロード.png');
        }

        .img2 { 
            background-image: url('27447498.jpg');
        }

        /* フッターエリア */
        .footer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            width: 100%;
            color: #555;
            font-size: 12px;
            background-color: #000;
        }

        /* 【新設】最初の画像をそのまま時計の枠として使う設定 */
        .image-clock-wrapper {
            position: relative;
            /* 最初の画像の縦横比に合わせて表示エリアを作ります */
            width: 200px; /* 飾りやすいように少しコンパクトにしています。サイズは自由に変えられます */
            aspect-ratio: 310 / 238; /* 元の画像の比率 */
            background-image: url('ダウンロード.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            margin-bottom: 8px;
        }

        /* 画像の「白い部分」のど真ん中に4桁の数字を配置する */
        #digital-clock {
            position: absolute;
            /* 画像内の白いスペース（下側）にぴったり収まるよう調整 */
            top: 58%; 
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* 最初のフォントと同じ「MS UI Gothic（アンチエイリアスなし）」を再現 */
            font-family: "MS UI Gothic", "MS Gothic", sans-serif;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: none;
            font-smooth: never;
            
            font-size: 32px; /* 4桁が枠に綺麗に収まる文字サイズ */
            font-weight: bold;
            color: #000000;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* スマホ専用設定 */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden; 
                position: fixed;  
                background-color: #000;
            }

            .container {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start; 
            }

            .game-screen {
                width: 100% !important;
                aspect-ratio: 4 / 3 !important; 
                height: auto !important;
                flex-shrink: 0; 
            }

            .footer-area {
                position: absolute;
                bottom: 10px;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="#" class="game-screen img1"></a>
        <a href="#" class="game-screen img2"></a>

        <div class="footer-area">
            
            <div class="image-clock-wrapper">
                <div id="digital-clock">00:00</div>
            </div>

            <div class="copyright">-2026 hayaserit-</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('digital-clock').textContent = `${hours}:${minutes}`;
        }
        updateClock();
        const secondsToNextMinute = 60 - new Date().getSeconds();
        setTimeout(function() {
            updateClock();
            setInterval(updateClock, 60000);
        }, secondsToNextMinute * 1000);
    </script>

</body>
</html>
