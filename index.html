<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Layout</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-screen {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url('27447498.jpg'); 
            
            /* --- PC・スマホ共通：4:3の比率を絶対維持 --- */
            aspect-ratio: 4 / 3;
            width: 100%;
            /* PCで巨大化しすぎないよう、高さを画面内に収める */
            max-height: 100vh; 
            /* 幅は自動的に4:3で計算される */
            width: auto; 
            max-width: 100%;
        }

        /* スマホ専用設定（画面幅768px以下） */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden; 
                position: fixed;  
                background-color: #000;
            }

            .container {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start; 
            }

            .game-screen {
                width: 100% !important;
                height: auto !important;
                aspect-ratio: 4 / 3 !important; 
                flex-shrink: 0; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="game-screen img1"></div>
        <div class="game-screen img2"></div>
    </div>

</body>
</html>
