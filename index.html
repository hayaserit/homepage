<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早世 hayaserit homepage</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 共通の画像設定 */
        .game-screen {
            display: block;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* PC表示の比率維持 */
            width: calc(100vh * 4 / 3); 
            max-width: 100%;
            aspect-ratio: 4 / 3; 
            height: auto;
        }

        /* --- 画像の個別指定 --- */
        .img1 { 
            background-image: url('ダウンロード.png'); /* 1枚目をダウンロード.pngに */
        }

        .img2 { 
            background-image: url('27447498.jpg'); /* 2枚目はそのまま */
        }

        /* フッターエリア */
        .footer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            width: 100%;
            color: #555;
            font-size: 12px;
            background-color: #000;
        }

        /* レトロウィンドウ風時計のスタイル */
        .window-clock {
            width: 160px; /* カウンターと同じくらいのコンパクトなサイズ */
            border: 2px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, 1px 1px #000000;
            background-color: #ffffff;
            font-family: "MS UI Gothic", "MS Gothic", monospace;
            font-size: 11px;
            margin-bottom: 8px; /* 下の著作権表示との隙間 */
            box-sizing: border-box;
        }

        /* 青いタイトルバー */
        .window-title-bar {
            background: linear-gradient(90deg, #004e92, #000080);
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-weight: bold;
        }

        /* タイトルバーのボタン */
        .window-controls {
            display: flex;
            gap: 2px;
        }
        .win-btn {
            background: #cbd2d6;
            border: 1px solid #ffffff;
            box-shadow: inset -1px -1px #707070, 1px 1px #000000;
            color: #000000;
            font-size: 8px;
            font-weight: bold;
            padding: 0px 3px;
            cursor: pointer;
            line-height: 1;
        }
        .win-close {
            background: #e64626;
            color: #ffffff;
        }

        /* 時計の数字が入る部分 */
        .window-body {
            padding: 8px;
            text-align: center;
            background-color: #ffffff;
        }

        /* 時:分 の文字デザイン */
        #digital-clock {
            font-size: 24px;
            font-family: "MS Gothic", monospace;
            font-weight: bold;
            color: #000000;
            letter-spacing: 1px;
        }

        /* スマホ専用設定 */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden; 
                position: fixed;  
                background-color: #000;
            }

            .container {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start; 
            }

            .game-screen {
                width: 100% !important;
                aspect-ratio: 4 / 3 !important; 
                height: auto !important;
                flex-shrink: 0; 
            }

            .footer-area {
                position: absolute;
                bottom: 10px;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="#" class="game-screen img1"></a>
        <a href="#" class="game-screen img2"></a>

        <div class="footer-area">
            
            <div class="window-clock">
                <div class="window-title-bar">
                    <span class="window-title">時計</span>
                    <div class="window-controls">
                        <button class="win-btn">?</button>
                        <button class="win-btn win-close">×</button>
                    </div>
                </div>
                <div class="window-body">
                    <div id="digital-clock">00:00</div>
                </div>
            </div>
            <div class="copyright">-2026 hayaserit-</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // 時・分を取得して常に2桁（00:00）にする
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            // 画面の時計テキストを書き換え
            document.getElementById('digital-clock').textContent = `${hours}:${minutes}`;
        }

        // ページを開いた瞬間に1回実行
        updateClock();

        // ぴったり次の「00秒」になった瞬間に更新を開始するためのタイマー設定
        const secondsToNextMinute = 60 - new Date().getSeconds();
        setTimeout(function() {
            updateClock();
            setInterval(updateClock, 60000); // 以降、1分（60000ミリ秒）ごとに更新
        }, secondsToNextMinute * 1000);
    </script>

</body>
</html>
