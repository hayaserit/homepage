<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Layout</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-screen {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* PCでも4:3基準の幅を維持 */
            width: calc(100vh * 4 / 3); 
            max-width: 100%;
            background-image: url('27447498.jpg'); /* アップロード済みの画像名 */
        }

        .img1 {
            height: 100vh;
        }

        .img2 {
            height: 130vh; 
        }

        /* スマホ専用設定 */
        @media (max-width: 768px) {
            html, body {
                height: 100svh;
                overflow: hidden;
                position: fixed;
            }
            .container {
                height: 100dvh;
            }
            .game-screen {
                width: 100%;
            }
            .img1 {
                height: auto;
                aspect-ratio: 4 / 3;
            }
            .img2 {
                flex-grow: 1;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="game-screen img1"></div>
        <div class="game-screen img2"></div>
    </div>

</body>
</html>
