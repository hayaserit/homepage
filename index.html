<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4:3 Classic Display</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            /* PCフルスクリーン時に左右に黒枠を作る設定 */
            max-width: calc(100vh * (4 / 3)); 
            margin: auto;
        }

        .image-box {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .content-img {
            width: 100%;
            height: 100%;
            aspect-ratio: 4 / 3;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- 1枚目の画像：指定のファイル名 -->
        <div class="image-box">
            <img src="27447498.jpg" alt="Upper Image" class="content-img">
        </div>

        <!-- 2枚目の画像：ここも必要に応じて書き換えてください -->
        <div class="image-box">
            <img src="27447498.jpg" alt="Lower Image" class="content-img">
        </div>
    </div>

</body>
</html>
