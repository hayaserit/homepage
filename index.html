<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Layout</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-screen {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* 背景画像：ご自身の画像名に合わせてください */
            background-image: url('27447498.jpg'); 
            width: calc(100vh * 4 / 3); 
            max-width: 100%;
        }

        /* PC表示時の高さ */
        .img1 { height: 100vh; }
        .img2 { height: 130vh; }

        /* スマホ専用設定（画面幅768px以下） */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden; /* スクロール完全固定 */
                position: fixed;  /* iOS等のバウンス対策 */
                background-color: #000;
            }

            .container {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start; /* 上から詰める */
            }

            .game-screen {
                width: 100% !important;
                /* 2枚とも4:3に固定 */
                aspect-ratio: 4 / 3 !important; 
                height: auto !important;
                flex-shrink: 0; /* 画面が小さくても潰さない */
            }

            /* img2が伸びていた原因をリセット */
            .img2 {
                flex-grow: 0 !important; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="game-screen img1"></div>
        <div class="game-screen img2"></div>
    </div>

</body>
</html>
