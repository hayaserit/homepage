<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アルカロイドアスキート(hayaserit homepage)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-screen {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url('27447498.jpg'); 
            
            /* --- PC表示の比率維持 --- */
            width: calc(100vh * 4 / 3); 
            max-width: 100%;
            aspect-ratio: 4 / 3; 
            height: auto;
        }

        /* フッターエリア（カウンターとコピーライト） */
        .footer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            width: 100%;
            color: #555;
            font-size: 12px;
            background-color: #000;
        }

        .counter {
            margin-bottom: 8px; /* コピーライトとの間隔 */
        }

        /* スマホ専用設定（画面幅768px以下） */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden; 
                position: fixed;  
                background-color: #000;
            }

            .container {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start; 
            }

            .game-screen {
                width: 100% !important;
                aspect-ratio: 4 / 3 !important; 
                height: auto !important;
                flex-shrink: 0; 
            }

            /* スマホではフッターを最下部に固定 */
            .footer-area {
                position: absolute;
                bottom: 10px;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="game-screen img1"></div>
        <div class="game-screen img2"></div>

        <!-- フッターエリア -->
        <div class="footer-area">
            <div class="counter">
                <!-- アクセスカウンター (type=27, width=6に設定) -->
                <!-- name=の後の文字列は必要に応じて変更してください -->
                <img src="http://www5.kannet.ne.jp/~counter/count.cgi?name=hayaserit01&type=27&width=6">
            </div>
            <div class="copyright">-2026 hayaserit-</div>
        </div>
    </div>

</body>
</html>
